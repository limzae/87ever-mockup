<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판촉에버 시안 메이커</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; }

.header { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 16px rgba(0,0,0,0.3); z-index: 100; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-badge { background: linear-gradient(135deg, #e94560, #c23152); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; letter-spacing: 0.5px; }
.logo h1 { font-size: 18px; font-weight: 700; }
.logo small { font-size: 12px; opacity: 0.6; display: block; }
.header-right { display: flex; gap: 8px; align-items: center; }
.mode-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.18s; font-family: inherit; }
.mode-btn.active { background: rgba(255,255,255,0.15); color: white; border-color: rgba(255,255,255,0.6); }
.mode-btn:hover { background: rgba(255,255,255,0.1); color: white; }
.undo-btn-hdr { padding: 5px 12px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.undo-btn-hdr:hover { background: rgba(255,255,255,0.15); color: white; }
.undo-btn-hdr:disabled { opacity: 0.35; cursor: not-allowed; }

.product-bar { background: white; padding: 10px 20px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #e5e7eb; overflow-x: auto; flex-shrink: 0; }
.product-bar-label { font-size: 11px; color: #9ca3af; font-weight: 600; white-space: nowrap; }
.prod-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: white; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.18s; white-space: nowrap; font-family: inherit; }
.prod-chip:hover { border-color: #e94560; color: #e94560; }
.prod-chip.active { background: #e94560; border-color: #e94560; color: white; box-shadow: 0 4px 12px rgba(233,69,96,0.35); }
.prod-thumb { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
.prod-thumb-ph { width: 28px; height: 28px; background: #f3f4f6; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size:14px; }
.add-prod-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px dashed #d1d5db; background: white; cursor: pointer; font-size: 12px; color: #6b7280; transition: all 0.18s; font-family: inherit; white-space: nowrap; }
.add-prod-btn:hover { border-color: #e94560; color: #e94560; }

.main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, #eff0f4 0%, #e3e5ec 50%, #d8dae3 100%); position: relative; overflow: hidden; }
.canvas-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.09) 100%); pointer-events: none; z-index: 2; }
.stage { position: relative; user-select: none; z-index: 3; transform-origin: center center; border-radius: 6px; }
.product-photo { display: block; border-radius: 4px; }

.print-zone { position: absolute; overflow: hidden; border: 2px dashed rgba(233,69,96,0.7); background: rgba(233,69,96,0.03); border-radius: 3px; }
.print-zone-label { position: absolute; top: -24px; left: 0; font-size: 10px; color: #e94560; font-weight: 600; white-space: nowrap; background: white; padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(233,69,96,0.3); pointer-events: none; }
.mm-tag { position: absolute; bottom: -22px; left: 0; font-size: 10px; color: #6366f1; font-weight: 700; white-space: nowrap; background: white; padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(99,102,241,0.3); pointer-events: none; z-index: 20; }

.zone-handle { position: absolute; width: 12px; height: 12px; background: white; border: 2px solid #e94560; border-radius: 2px; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.zone-handle.tl { top:-6px; left:-6px; cursor:nw-resize; }
.zone-handle.tr { top:-6px; right:-6px; cursor:ne-resize; }
.zone-handle.bl { bottom:-6px; left:-6px; cursor:sw-resize; }
.zone-handle.br { bottom:-6px; right:-6px; cursor:se-resize; }

.d-elem { position: absolute; cursor: move; }
.d-elem.sel { outline: 2px solid #e94560; outline-offset: 3px; border-radius: 3px; }
.del-btn { position: absolute; top:-11px; right:-11px; width:22px; height:22px; background:#ef4444; color:white; border:none; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:20; box-shadow:0 2px 6px rgba(239,68,68,0.5); font-family:inherit; line-height:1; }

.canvas-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; font-size: 11px; padding: 5px 16px; border-radius: 20px; white-space: nowrap; z-index: 5; pointer-events: none; }
.pos-indicator { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(233,69,96,0.9); color: white; font-size: 11px; padding: 4px 12px; border-radius: 12px; white-space: nowrap; z-index: 5; pointer-events: none; font-family: monospace; }
.scale-badge { position: absolute; top: 14px; right: 14px; background: rgba(0,0,0,0.45); color: white; font-size: 11px; padding: 5px 12px; border-radius: 12px; z-index: 5; cursor: pointer; font-family: monospace; transition: background 0.15s; user-select: none; }
.scale-badge:hover { background: rgba(233,69,96,0.8); }
.canvas-wrap.actual-size { overflow: auto; align-items: flex-start; justify-content: flex-start; }
.stage-actual { padding: 32px; }

.no-product { text-align:center; color:#6b7280; display:flex; flex-direction:column; align-items:center; gap:12px; }
.no-product-icon { font-size:56px; }
.no-product h3 { font-size:16px; font-weight:600; color:#374151; }
.cta-btn { background:#e94560; color:white; border:none; padding:10px 24px; border-radius:20px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }

.panel { width: 300px; background: white; border-left: 1px solid #e5e7eb; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
.section { border: 1px solid #eaecf0; border-radius: 14px; padding: 14px; background: #fafbff; }
.section h3 { font-size: 11px; font-weight: 700; color: #6b7280; margin-bottom: 11px; text-transform: uppercase; letter-spacing: 0.7px; }
.fg { margin-bottom: 9px; }
.fg:last-child { margin-bottom: 0; }
.fg label { display: block; font-size: 12px; color: #4b5563; margin-bottom: 3px; font-weight: 500; }
.fg input[type="text"], .fg select { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; background: white; font-family: inherit; transition: border-color 0.18s; }
.fg input[type="text"]:focus, .fg select:focus { border-color: #e94560; box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
.fg input[type="range"] { width: 100%; accent-color: #e94560; cursor: pointer; }
.fg input[type="color"] { width: 100%; height: 34px; border: 1px solid #d1d5db; border-radius: 8px; padding: 2px 4px; cursor: pointer; background: white; }

.rr { display: flex; align-items: center; gap: 8px; }
.rr input[type="range"] { flex: 1; }
.rv { font-size: 12px; color: #e94560; font-weight: 600; min-width: 34px; text-align: right; }

.pos-row { display: flex; gap: 6px; margin-bottom: 8px; }
.pos-field { flex: 1; }
.pos-field label { font-size: 10px; color: #9ca3af; display: block; margin-bottom: 3px; font-weight: 600; text-transform: uppercase; }
.pos-field input { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; text-align: center; font-family: 'Courier New', monospace; outline: none; font-weight: 600; }
.pos-field input:focus { border-color: #e94560; }

/* Align canvas-position buttons */
.align-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 6px; }
.align-btn { padding: 7px 4px; border: 1px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; font-size: 12px; color: #374151; transition: all 0.15s; font-family: inherit; text-align: center; }
.align-btn:hover { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.04); }

/* Text align L/C/R toggle */
.text-align-row { display: flex; gap: 4px; }
.ta-btn { flex: 1; padding: 7px 0; border: 1.5px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: all 0.15s; font-family: inherit; }
.ta-btn.on { border-color: #e94560; background: rgba(233,69,96,0.08); }
.ta-btn:hover { border-color: #e94560; }

.arrow-hint { font-size: 11px; color: #9ca3af; text-align: center; padding: 5px; background: #f9fafb; border-radius: 7px; }
.zone-sel-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.zone-sel-btn { padding:10px 4px; border:1.5px solid #e5e7eb; border-radius:10px; background:white; cursor:pointer; font-size:13px; font-weight:600; color:#6b7280; transition:all 0.15s; font-family:inherit; text-align:center; }
.zone-sel-btn.on { border-color:#e94560; background:linear-gradient(135deg,rgba(233,69,96,0.08),rgba(194,49,82,0.05)); color:#e94560; }
.zone-sel-btn:hover { border-color:#e94560; color:#e94560; }
.zone-sel-label { font-size:10px; display:block; margin-top:2px; opacity:0.7; font-weight:400; }
.arrow-hint kbd { background: #e5e7eb; border: 1px solid #d1d5db; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-family: monospace; }

.btn { width: 100%; padding: 9px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; font-family: inherit; }
.btn-red { background: linear-gradient(135deg, #e94560, #c23152); color: white; margin-top: 10px; }
.btn-red:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(233,69,96,0.4); }
.btn-del { background: #fee2e2; color: #ef4444; margin-top: 8px; }
.btn-del:hover { background: #fecaca; }

/* Export buttons */
.export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.btn-png { padding: 10px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.18s; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
.btn-png:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(59,130,246,0.4); }
.btn-jpg { padding: 10px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.18s; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
.btn-jpg:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(245,158,11,0.4); }
.export-note { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 7px; }

.upload-box { border: 2px dashed #d1d5db; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.18s; display: block; }
.upload-box:hover { border-color: #e94560; background: rgba(233,69,96,0.03); }
.upload-box input { display: none; }
.upload-icon { font-size: 26px; }
.upload-main { font-size: 13px; color: #374151; font-weight: 500; margin-top: 4px; }
.upload-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }

.txt-preview { min-height: 36px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 10px; display: flex; align-items: center; justify-content: center; background: white; margin-top: 4px; overflow: hidden; }
.tip { background: #fff5f5; border: 1px solid #fecdd3; border-radius: 10px; padding: 10px 13px; font-size: 12px; color: #be123c; line-height: 1.7; }
.tip-blue { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 13px; font-size: 12px; color: #1d4ed8; line-height: 1.7; }

.zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.zone-field label { font-size: 10px; color: #9ca3af; display: block; margin-bottom: 3px; font-weight: 600; }
.zone-field input { width: 100%; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 12px; text-align: center; font-family: monospace; outline: none; }
.zone-field input:focus { border-color: #e94560; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: white; border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #f3f4f6; color: #374151; }
.btn-confirm { background: linear-gradient(135deg, #e94560, #c23152); color: white; }

.guide-wrap { flex: 1; overflow: auto; padding: 32px; background: radial-gradient(ellipse at center, #dde1ef 0%, #cdd1e3 100%); }
.guide-card { max-width: 680px; margin: 0 auto; background: white; border-radius: 20px; padding: 32px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
.guide-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.guide-card > p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
.guide-item { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
.guide-num { min-width: 24px; height: 24px; background: #e94560; color: white; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.guide-text { font-size: 12px; color: #374151; line-height: 1.65; }
.guide-text strong { color: #111; display: block; margin-bottom: 2px; font-size: 13px; }
.guide-footer { background: #fff5f5; border: 1px solid #fecdd3; border-radius: 12px; padding: 14px 16px; margin-top: 8px; }
.guide-footer p { font-size: 13px; color: #be123c; font-weight: 600; margin-bottom: 6px; }
.guide-footer ol { font-size: 12px; color: #9f1239; line-height: 1.9; padding-left: 16px; }

/* Toast notification */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }

/* Reference gallery */
.refs-wrap { flex:1; overflow:auto; padding:24px; background:radial-gradient(ellipse at center,#dde1ef 0%,#cdd1e3 100%); }
.refs-empty { text-align:center; color:#6b7280; display:flex; flex-direction:column; align-items:center; gap:12px; padding-top:60px; }
.refs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px; max-width:1100px; margin:0 auto; }
.ref-card { background:white; border-radius:12px; overflow:hidden; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.1); transition:all 0.18s; }
.ref-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.18); }
.ref-img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
.ref-name { padding:7px 10px; font-size:12px; font-weight:500; color:#374151; }
.ref-zoom-modal { display:flex; flex-direction:column; align-items:center; }
.ref-zoom-modal img { max-width:85vw; max-height:78vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
.ref-zoom-caption { color:white; font-size:13px; margin-top:10px; }
.ref-zoom-close { margin-top:14px; padding:8px 24px; border-radius:20px; border:none; background:white; color:#111; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; }
.refs-header { max-width:1100px; margin:0 auto 16px; display:flex; align-items:center; justify-content:space-between; }
.refs-header h2 { font-size:16px; font-weight:700; color:#1f2937; }
.refs-header p { font-size:12px; color:#6b7280; margin-top:2px; }

/* Stroke/shadow toggle */
.toggle-row { display:flex; align-items:center; gap:8px; }
.toggle-row input[type=checkbox] { width:16px; height:16px; accent-color:#e94560; cursor:pointer; }
.toggle-row label { font-size:12px; color:#4b5563; cursor:pointer; user-select:none; }

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  body { overflow: hidden; }
  .app { height: 100dvh; }

  /* Compact header */
  .header { padding: 8px 14px; }
  .logo h1 { font-size: 15px; }
  .logo small { display: none; }
  .mode-btn { padding: 5px 10px; font-size: 11px; }
  .undo-btn-hdr { padding: 4px 9px; font-size: 11px; }

  /* Product bar slimmer */
  .product-bar { padding: 7px 14px; }

  /* Main: stack canvas on top, panel below */
  .main { flex-direction: column; overflow: hidden; }

  /* Canvas takes top 52% */
  .canvas-wrap { flex: none; height: 52dvh; width: 100%; }
  .canvas-wrap.actual-size { overflow: auto; align-items: flex-start; justify-content: flex-start; height: 52dvh; }

  /* Panel fills bottom, scrollable */
  .panel { width: 100%; height: 48dvh; border-left: none; border-top: 2px solid #e5e7eb; overflow-y: auto; flex-direction: row; flex-wrap: wrap; gap: 10px; padding: 10px 12px; align-content: flex-start; }
  .section { flex: 1 1 280px; }

  /* Bigger touch targets */
  .zone-sel-btn { padding: 13px 4px; font-size: 14px; }
  .btn { padding: 12px; font-size: 14px; }
  .btn-red { margin-top: 6px; }
  .del-btn { width: 28px; height: 28px; font-size: 16px; top: -14px; right: -14px; }

  /* Refs gallery tighter */
  .refs-wrap { padding: 14px; }
  .refs-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

  /* Guide */
  .guide-wrap { padding: 16px; }
  .guide-card { padding: 20px; border-radius: 14px; }
}

@media (max-width: 480px) {
  .canvas-wrap { height: 55dvh; }
  .panel { height: 45dvh; }
  .logo h1 { font-size: 13px; }
  .mode-btn { padding: 4px 8px; font-size: 10px; }
}
    </style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script>
(function() {
'use strict';
var R = React;
var h = R.createElement;
var useState  = R.useState;
var useRef    = R.useRef;

/* ── Toast ── */
function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

    var modeS    = useState('customer'); var mode=modeS[0],setMode=modeS[1];
    var prodsS   = useState(DEMO);       var products=prodsS[0],setProducts=prodsS[1];
    var selPS    = useState(DEMO[0].id); var selProd=selPS[0],setSelProd=selPS[1];
    var elemsS   = useState([]);         var elems=elemsS[0],setElems=elemsS[1];
    var selIdS   = useState(null);       var selId=selIdS[0],setSelId=selIdS[1];
    var modalS   = useState(false);      var showModal=modalS[0],setShowModal=modalS[1];
    var newNameS = useState('');         var newName=newNameS[0],setNewName=newNameS[1];
    var newCatS  = useState('텀블러');    var newCat=newCatS[0],setNewCat=newCatS[1];
    var txtS     = useState('');         var txt=txtS[0],setTxt=txtS[1];
    var txtSzS   = useState(22);         var txtSz=txtSzS[0],setTxtSz=txtSzS[1];
    var txtClrS  = useState('#ffffff');  var txtClr=txtClrS[0],setTxtClr=txtClrS[1];
    var txtFntS  = useState("'Noto Sans KR',sans-serif"); var txtFnt=txtFntS[0],setTxtFnt=txtFntS[1];
    var scaleS   = useState(1);          var dispScale=scaleS[0],setDispScale=scaleS[1];
    var fitModeS = useState('fit');      var fitMode=fitModeS[0],setFitMode=fitModeS[1];
    var isDragS  = useState(false);      var isDragging=isDragS[0],setIsDragging=isDragS[1];
    var dragPosS = useState({x:0,y:0}); var dragPos=dragPosS[0],setDragPos=dragPosS[1];
    var histLenS = useState(0);          var histLen=histLenS[0],setHistLen=histLenS[1];
    var zoneSelS = useState('center');    var zoneSel=zoneSelS[0],setZoneSel=zoneSelS[1];
    var sideS = useState('front');         var side=sideS[0],setSide=sideS[1];
    var elemsFrontS = useState([]);         var elemsFront=elemsFrontS[0],setElemsFront=elemsFrontS[1];
    var elemsBackS  = useState([]);         var elemsBack=elemsBackS[0],setElemsBack=elemsBackS[1];
    var exportingS = useState(false);    var exporting=exportingS[0],setExporting=exportingS[1];
    var refsS      = useState([]);       var refs=refsS[0],setRefs=refsS[1];
    var refZoomS   = useState(null);     var refZoom=refZoomS[0],setRefZoom=refZoomS[1];

    var canvasRef   = useRef(null);
    var dragRef     = useRef(null);
    var zoneResRef  = useRef(null);
    var scaleRef    = useRef(1);
    var prodsRef    = useRef(products);
    var elemsRef    = useRef(elems);
    var selProdRef  = useRef(selProd);
    var selIdRef    = useRef(selId);
    var historyRef  = useRef([]); // undo stack
    var refsRef     = useRef([]);
    var fitModeRef  = useRef('fit');
    var fitScaleRef = useRef(1);
    var zoneSelRef  = useRef('center');

    useEffect(function(){ prodsRef.current=products; },[products]);
    useEffect(function(){ elemsRef.current=elems; },[elems]);
    useEffect(function(){ selProdRef.current=selProd; },[selProd]);
    useEffect(function(){ selIdRef.current=selId; },[selId]);
    useEffect(function(){ refsRef.current=refs; },[refs]);
    useEffect(function(){ loadFromUrl(products); },[]);

    useEffect(function(){ zoneSelRef.current=zoneSel; },[zoneSel]);

    var prod  = products.find(function(p){ return p.id===selProd; });
    var selEl = elems.find(function(e){ return e.id===selId; });
    var _zonePresets = prod ? (side==='back' && prod.zonePresetsBack ? prod.zonePresetsBack : prod.zonePresets) : null;
    var _photoSrc = prod ? (side==='back' && prod.photoSrcBack ? prod.photoSrcBack : prod.photoSrc) : null;
    var zone  = prod ? (_zonePresets ? _zonePresets[zoneSel] : prod.zone) : null;

    /* ── Undo ── */
    function saveToUrl() {
        var state = {
            prodId: prod ? prod.id : null,
            side: side,
            zoneSel: zoneSel,
            front: elemsFront.map(function(el){
                // image 요소는 src 제외 (URL 크기 문제)
                if(el.type==='img') return Object.assign({},el,{src:null});
                return el;
            }),
            back: elemsBack.map(function(el){
                if(el.type==='img') return Object.assign({},el,{src:null});
                return el;
            })
        };
        try {
            var json = JSON.stringify(state);
            var b64 = btoa(unescape(encodeURIComponent(json)));
            var url = window.location.href.split('#')[0] + '#' + b64;
            window.history.replaceState(null,'',url);
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function(){
                    toast('🔗 공유 링크가 클립보드에 복사됐어요!');
                });
            } else {
                // fallback
                var ta = document.createElement('textarea');
                ta.value = url; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                toast('🔗 공유 링크가 클립보드에 복사됐어요!');
            }
        } catch(e) { toast('❌ 링크 생성 실패: '+e.message); }
    }

    function loadFromUrl(prods) {
        var hash = window.location.hash.slice(1);
        if (!hash) return;
        try {
            var json = decodeURIComponent(escape(atob(hash)));
            var state = JSON.parse(json);
            if (state.prodId && prods) {
                var found = prods.find(function(p){ return p.id===state.prodId; });
                if (found) setSelProd(state.prodId);
            }
            if (state.front && state.front.length) setElemsFront(state.front);
            if (state.back  && state.back.length)  setElemsBack(state.back);
            if (state.side)    setSide(state.side);
            if (state.zoneSel) setZoneSel(state.zoneSel);
        } catch(e) { /* invalid hash, ignore */ }
    }

    function pushHistory() {
        historyRef.current.push(JSON.stringify(elemsRef.current));
        if (historyRef.current.length > 30) historyRef.current.shift();
        setHistLen(historyRef.current.length);
    }
    function undo() {
        if (!historyRef.current.length) return;
        var prev = historyRef.current.pop();
        setElems(JSON.parse(prev));
        setSelId(null);
        setHistLen(historyRef.current.length);
    }

    /* ── Responsive scale ── */
    useEffect(function() {
        function calcScale() {
            if (!canvasRef.current || !prod) return;
            var rect = canvasRef.current.getBoundingClientRect();
            var sw = (rect.width - 48) / prod.photoW;
            var sh = (rect.height - 48) / prod.photoH;
            var s = Math.min(sw, sh);
            fitScaleRef.current = s;
            if (fitModeRef.current === 'fit') {
                scaleRef.current = s;
                setDispScale(s);
            }
        }
        calcScale();
        var obs = new ResizeObserver(calcScale);
        if (canvasRef.current) obs.observe(canvasRef.current);
        return function(){ obs.disconnect(); };
    }, [prod]);

    /* ── Zone presets helper ── */
    function makePresets(pw, ph, bodyZone) {
        // Fixed 33mm width (~21% of standard tumbler width), equal height zones
        var zw  = Math.round(pw * 0.211);
        var zh  = Math.round(bodyZone.h * 0.128); // ~80px equivalent height
        var cx  = Math.round(pw / 2);
        var l   = cx - Math.round(zw/2);
        var bt  = bodyZone.t, bh = bodyZone.h;
        // 3 equal zones, evenly spaced within body
        var gap = Math.round((bh - zh*3) / 4);
        return {
            top:    {l:l, t:bt + gap,           w:zw, h:zh},
            center: {l:l, t:bt + gap*2 + zh,    w:zw, h:zh},
            bottom: {l:l, t:bt + gap*3 + zh*2,  w:zw, h:zh}
        };
    }

    /* ── Fit / Actual size toggle ── */
    function toggleFitMode() {
        var next = fitModeRef.current === 'fit' ? 'actual' : 'fit';
        fitModeRef.current = next;
        setFitMode(next);
        var newScale = next === 'actual' ? 1 : fitScaleRef.current;
        scaleRef.current = newScale;
        setDispScale(newScale);
    }

    /* ── Photo upload ── */
    function uploadProdPhoto(e) {
        var file = e.target.files[0]; if (!file||!prod) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                var ph = Math.min(MAX_PHOTO_H, img.height);
                var pw = Math.round(ph * img.width / img.height);
                var newZone = { l:Math.round(pw*0.31), t:Math.round(ph*0.22), w:Math.round(pw*0.38), h:Math.round(ph*0.55) };
                var newPresets = makePresets(pw, ph, newZone);
                setProducts(function(ps){ return ps.map(function(p){ return p.id===prod.id ? Object.assign({},p,{photoSrc:ev.target.result,photoW:pw,photoH:ph,zone:newPresets.center,zonePresets:newPresets}) : p; }); });
                setElems([]); setSelId(null); historyRef.current=[];
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value='';
    }

    /* ── Element actions ── */
    /* measure text width via offscreen canvas */
    function measureTextWidth(text, fontSize, fontFamily) {
        var tc = document.createElement('canvas');
        var tx = tc.getContext('2d');
        tx.font = fontSize + 'px ' + fontFamily;
        return tx.measureText(text).width;
    }

    /* fit fontSize so text fills zone width */
    function fitFontSize(text, fontFamily, targetW) {
        var initSz = 40;
        var measured = measureTextWidth(text, initSz, fontFamily);
        if (measured <= 0) return initSz;
        return Math.min(120, Math.max(8, Math.round(initSz * targetW / measured)));
    }

    function addText() {
        if (!txt.trim()||!prod) return;
        pushHistory();
        var targetW = zone ? zone.w - 4 : 100;
        var autoSz = fitFontSize(txt, txtFnt, targetW);
        var el = { id:uid(), type:'text', content:txt,
            x: 2,
            y: Math.max(0, Math.round((zone ? zone.h : 100)/2 - autoSz*0.625)),
            size:autoSz, color:txtClr, font:txtFnt, align:'left', opacity:1,
            stroke:0, strokeColor:'#000000', shadow:false };
        setElems(function(p){ return p.concat([el]); });
        setSelId(el.id); setTxt('');
    }

    /* fit selected text element to zone width */
    function fitTextToZone() {
        if (!selEl||selEl.type!=='text'||!zone) return;
        var autoSz = fitFontSize(selEl.content, selEl.font, zone.w - 4);
        updEl(selId, {size: autoSz, x: 2, align: 'left'});
    }

    function addImage(e) {
        var file = e.target.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                pushHistory();
                var w = Math.min(zone.w-10, 120);
                var el = { id:uid(), type:'image', src:ev.target.result, x:6, y:6, w:w, h:Math.round(w*img.height/img.width), opacity:1 };
                setElems(function(p){ return p.concat([el]); });
                setSelId(el.id);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value='';
    }

    function delEl(id) {
        pushHistory();
        setElems(function(p){ return p.filter(function(e){ return e.id!==id; }); });
        setSelId(null);
    }

    function updEl(id, patch) {
        setElems(function(p){ return p.map(function(e){ return e.id===id ? Object.assign({},e,patch) : e; }); });
    }

    /* ── Align helpers ── */
    function alignEl(axis) {
        if (!selEl||!zone) return;
        var patch={};
        if (axis==='h'||axis==='c') {
            var ew = selEl.type==='image' ? selEl.w : Math.round(selEl.size*(selEl.content||'').length*0.55);
            patch.x = Math.max(0, Math.round((zone.w-ew)/2));
        }
        if (axis==='v'||axis==='c') {
            var eh = selEl.type==='image' ? selEl.h : Math.round(selEl.size*1.3);
            patch.y = Math.max(0, Math.round((zone.h-eh)/2));
        }
        updEl(selId, patch);
    }

    function updateZone(field, val) {
        var sel = zoneSelRef.current;
        setProducts(function(ps){ return ps.map(function(p){
            if (p.id!==selProd) return p;
            if (p.zonePresets) {
                var pz = Object.assign({},p.zonePresets);
                pz[sel] = Object.assign({},pz[sel],{[field]:Number(val)});
                return Object.assign({},p,{zone:pz[sel],zonePresets:pz});
            }
            return Object.assign({},p,{zone:Object.assign({},p.zone,{[field]:Number(val)})});
        }); });
    }

    /* ── PNG / JPEG Export ── */
    function exportMockup(fmt) {
        if (!prod||!prod.photoSrc) { alert('먼저 ⚙️ 제품 관리 탭에서 제품 사진을 업로드해주세요.'); return; }
        if (!elemsRef.current.length) { alert('추가된 디자인 요소가 없습니다. 텍스트나 로고를 먼저 추가해주세요.'); return; }
        setExporting(true);
        var canvas = document.createElement('canvas');
        canvas.width = prod.photoW; canvas.height = prod.photoH;
        var ctx = canvas.getContext('2d');
        var _zp = (side==='back' && prod.zonePresetsBack ? prod.zonePresetsBack : prod.zonePresets);
        var z = _zp ? _zp[zoneSelRef.current] : prod.zone;
        var curElems = elemsRef.current.slice();

        // Collect promises: bg + all image elements
        var promises = [new Promise(function(res){ var i=new Image(); i.onload=function(){ res({t:'bg',img:i}); }; i.src=prod.photoSrc; })];
        curElems.forEach(function(el){
            if (el.type==='image') promises.push(new Promise(function(res){ var i=new Image(); i.onload=function(){ res({t:'img',img:i,id:el.id}); }; i.src=el.src; }));
        });

        Promise.all(promises).then(function(loaded){
            // Draw background
            var bg = loaded.find(function(l){ return l.t==='bg'; });
            ctx.drawImage(bg.img, 0, 0, prod.photoW, prod.photoH);

            // Draw each element
            curElems.forEach(function(el){
                ctx.save();
                ctx.globalAlpha = (el.opacity!==undefined) ? el.opacity : 1;
                if (el.type==='text') {
                    var fontStr = el.size+'px '+el.font.replace(/'/g,'');
                    ctx.font = fontStr;
                    ctx.fillStyle = el.color;
                    ctx.textBaseline = 'top';
                    var textAlign = el.align||'left';
                    ctx.textAlign = textAlign;
                    var ax = z.l + el.x;
                    if (textAlign==='center') ax = z.l + z.w/2;
                    if (textAlign==='right')  ax = z.l + z.w - el.x;
                    if (el.shadow) { ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=5; ctx.shadowOffsetX=1; ctx.shadowOffsetY=2; }
                    if (el.stroke && el.stroke>0) {
                        ctx.strokeStyle = el.strokeColor||'#000';
                        ctx.lineWidth = el.stroke*2;
                        ctx.lineJoin = 'round';
                        ctx.strokeText(el.content, ax, z.t+el.y);
                    }
                    ctx.fillText(el.content, ax, z.t+el.y);
                    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
                } else {
                    var entry = loaded.find(function(l){ return l.t==='img'&&l.id===el.id; });
                    if (entry) ctx.drawImage(entry.img, z.l+el.x, z.t+el.y, el.w, el.h);
                }
                ctx.restore();
            });

            var mime = fmt==='jpg' ? 'image/jpeg' : 'image/png';
            var url = canvas.toDataURL(mime, 0.93);
            var d = new Date();
            var ds = d.getFullYear()+''+('0'+(d.getMonth()+1)).slice(-2)+''+('0'+d.getDate()).slice(-2);
            var filename = '판촉에버_시안_'+ds+'.'+fmt;
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                /* iOS Safari: <a download> 미지원 → 새 탭에서 열어 길게 눌러 저장 */
                var win = window.open('', '_blank');
                if (win) {
                    win.document.write('<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}img{max-width:100%;border-radius:8px}p{color:#aaa;margin-top:16px;font-size:14px;text-align:center}</style></head><body><img src="'+url+'"><p>이미지를 길게 눌러 저장하세요 📥</p></body></html>');
                    win.document.close();
                    toast('✅ 새 탭에서 이미지를 길게 눌러 저장하세요');
                } else {
                    toast('⚠️ 팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요');
                }
            } else {
                var a = document.createElement('a');
                a.download = filename;
                a.href = url;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                toast('✅ '+fmt.toUpperCase()+' 파일로 저장되었습니다');
            }
            setExporting(false);
        }).catch(function(){ setExporting(false); toast('❌ 저장 중 오류가 발생했습니다'); });
    }

    /* ── Reference images ── */
    function uploadRef(e) {
        var files = Array.from(e.target.files);
        files.forEach(function(file){
            var reader = new FileReader();
            reader.onload = function(ev){
                var cleanName = file.name.replace(/\.[^.]+$/,'');
                setRefs(function(prev){ return prev.concat([{id:uid(),src:ev.target.result,name:cleanName}]); });
            };
            reader.readAsDataURL(file);
        });
        e.target.value='';
    }
    function delRef(id){ setRefs(function(prev){ return prev.filter(function(r){ return r.id!==id; }); }); }

    function confirmAddProd() {
        if (!newName.trim()) return;
        var defZone={l:118,t:155,w:184,h:250};
        var defPresets=makePresets(420,560,defZone);
        var np={id:'prod-'+uid(),name:newName,category:newCat,photoSrc:null,photoW:420,photoH:560,zone:defPresets.center,zonePresets:defPresets};
        setProducts(function(p){ return p.concat([np]); });
        setSelProd(np.id); setElems([]); setSelId(null); setNewName(''); setShowModal(false); setMode('admin');
    }

    /* ── Pointer helpers (mouse + touch unified) ── */
    function clientXY(e) {
        if (e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
        if (e.changedTouches && e.changedTouches.length) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
        return {x:e.clientX, y:e.clientY};
    }

    /* ── Drag elements ── */
    function onElemDown(e,id) {
        e.stopPropagation(); setSelId(id);
        var el = elemsRef.current.find(function(el){ return el.id===id; });
        var pt = clientXY(e);
        dragRef.current={id,mx0:pt.x,my0:pt.y,ex0:el.x,ey0:el.y,prod:selProd};
        setIsDragging(true);
    }

    function onZoneHandleDown(e, corner) {
        e.stopPropagation(); if(!prod) return;
        var z = prod.zonePresets ? prod.zonePresets[zoneSelRef.current] : prod.zone;
        var pt = clientXY(e);
        zoneResRef.current={corner,mx0:pt.x,my0:pt.y,l:z.l,t:z.t,w:z.w,h:z.h,prod:selProd,zoneKey:zoneSelRef.current};
    }

    /* ── Global events ── */
    useEffect(function(){
        function onMove(e) {
            var s = scaleRef.current;
            var pt = clientXY(e);
            if (dragRef.current) {
                var d=dragRef.current;
                var p2=prodsRef.current.find(function(p){ return p.id===d.prod; });
                if (!p2) return;
                var z=p2.zonePresets ? p2.zonePresets[zoneSelRef.current] : p2.zone;
                var nx=Math.max(0,Math.min(z.w-8,Math.round(d.ex0+(pt.x-d.mx0)/s)));
                var ny=Math.max(0,Math.min(z.h-8,Math.round(d.ey0+(pt.y-d.my0)/s)));
                setDragPos({x:nx,y:ny});
                setElems(function(prev){ return prev.map(function(el){ return el.id===d.id ? Object.assign({},el,{x:nx,y:ny}) : el; }); });
            }
            if (zoneResRef.current) {
                var r=zoneResRef.current;
                var dx=Math.round((pt.x-r.mx0)/s), dy=Math.round((pt.y-r.my0)/s);
                var l=r.l,t=r.t,w=r.w,hh=r.h;
                if (r.corner==='tl'){l=Math.max(0,r.l+dx);t=Math.max(0,r.t+dy);w=Math.max(20,r.w-dx);hh=Math.max(20,r.h-dy);}
                if (r.corner==='tr'){t=Math.max(0,r.t+dy);w=Math.max(20,r.w+dx);hh=Math.max(20,r.h-dy);}
                if (r.corner==='bl'){l=Math.max(0,r.l+dx);w=Math.max(20,r.w-dx);hh=Math.max(20,r.h+dy);}
                if (r.corner==='br'){w=Math.max(20,r.w+dx);hh=Math.max(20,r.h+dy);}
                setProducts(function(ps){ return ps.map(function(p){
                    if (p.id!==r.prod) return p;
                    if (p.zonePresets && r.zoneKey) {
                        var pz2=Object.assign({},p.zonePresets);
                        pz2[r.zoneKey]={l:l,t:t,w:w,h:hh};
                        return Object.assign({},p,{zone:pz2[r.zoneKey],zonePresets:pz2});
                    }
                    return Object.assign({},p,{zone:{l:l,t:t,w:w,h:hh}});
                }); });
            }
        }
        function onUp(){ dragRef.current=null; zoneResRef.current=null; setIsDragging(false); }
        function onKey(e) {
            if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undo(); return; }
            var sid=selIdRef.current;
            if (!sid) return;
            if (!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) return;
            e.preventDefault();
            var step=e.shiftKey?10:1;
            var dx=e.key==='ArrowLeft'?-step:e.key==='ArrowRight'?step:0;
            var dy=e.key==='ArrowUp'?-step:e.key==='ArrowDown'?step:0;
            var cur=prodsRef.current.find(function(p){ return p.id===selProdRef.current; });
            var z2=cur?cur.zone:{w:9999,h:9999};
            setElems(function(prev){ return prev.map(function(el){ return el.id!==sid?el:Object.assign({},el,{x:Math.max(0,Math.min(z2.w-8,el.x+dx)),y:Math.max(0,Math.min(z2.h-8,el.y+dy))}); }); });
        }
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);

            ),
            // Image add
            h('div',{className:'section'},
                h('h3',null,'🖼️ 이미지 / 로고'),
                h('label',{className:'upload-box'},
                    h('input',{type:'file',accept:'image/*,.svg',onChange:addImage}),
                    h('div',{className:'upload-icon'},'📁'),
                    h('div',{className:'upload-main'},'클릭해서 파일 선택'),
                    h('div',{className:'upload-sub'},'PNG · JPG · SVG (투명 배경 권장)')
                )
            ),
            renderSelElPanel(),
            h('div',{className:'tip'},'💡 ',h('strong',null,'Ctrl+Z'),' 되돌리기  ·  드래그 이동  ·  ',h('strong',null,'↑↓←→'),' 미세조정')
        );
    }

    // Header — customer sees only design+refs, admin sees all
    var customerModes=['customer','refs'];
    var adminModes=['customer','refs','admin','guide'];
    var visibleModes=mode==='admin'||mode==='guide'?adminModes:customerModes;
    var labels={customer:'🎨 시안 제작',refs:'📋 레퍼런스',admin:'⚙️ 제품 관리',guide:'📷 촬영 가이드'};
    var modeBtns=visibleModes.map(function(m){
        return h('button',{key:m,className:'mode-btn'+(mode===m?' active':''),onClick:function(){setMode(m);}},labels[m]);
    });

    // Product bar
    var prodBar=(mode!=='guide'&&mode!=='refs')?h('div',{className:'product-bar'},
        h('span',{className:'product-bar-label'},'제품'),
        products.map(function(p){
            return h('button',{key:p.id,className:'prod-chip'+(selProd===p.id?' active':''),onClick:function(){setSelProd(p.id);setElems([]);setSelId(null);}},
                p.photoSrc?h('img',{className:'prod-thumb',src:p.photoSrc,alt:p.name}):h('div',{className:'prod-thumb-ph'},'📦'),
                p.name
            );
        }),
        mode==='admin'?h('button',{className:'add-prod-btn',onClick:function(){setShowModal(true);}},'+  제품 추가'):null
    ):null;

    // Modal
    var modal=showModal?h('div',{className:'modal-bg',onClick:function(){setShowModal(false);}},
        h('div',{className:'modal',onClick:function(e){e.stopPropagation();}},
            h('h2',null,'새 제품 추가'),
            h('div',{className:'fg'},h('label',null,'제품명'),h('input',{type:'text',value:newName,placeholder:'예: 락앤락 텀블러 500ml',autoFocus:true,onChange:function(e){setNewName(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')confirmAddProd();}})),
            h('div',{className:'fg',style:{marginTop:10}},h('label',null,'카테고리'),h('select',{value:newCat,onChange:function(e){setNewCat(e.target.value);}},['텀블러','머그컵','에코백','볼펜','USB','기타'].map(function(c){return h('option',{key:c},c);}))),
            h('p',{style:{fontSize:12,color:'#9ca3af',marginTop:10}},'사진과 인쇄 영역은 다음 단계에서 설정합니다'),
            h('div',{className:'modal-btns'},h('button',{className:'btn-cancel',onClick:function(){setShowModal(false);}},'취소'),h('button',{className:'btn-confirm',onClick:confirmAddProd},'추가하기'))
        )
    ):null;

    return h('div',{className:'app'},
        h('div',{className:'header'},
            h('div',{className:'logo'},
            h('div',{className:'logo-badge',onClick:function(){if(mode==='customer'||mode==='refs'){setMode('admin');}else{setMode('customer');}},style:{cursor:'pointer',userSelect:'none'}},'판촉에버'),
            h('div',null,h('h1',null,'시안 메이커'),h('small',null,'나만의 판촉물 디자인을 직접 만들어보세요'))
        ),
            h('div',{className:'header-right'},
                h('button',{className:'undo-btn-hdr',onClick:saveToUrl,style:{background:'rgba(99,102,241,0.2)',borderColor:'rgba(99,102,241,0.5)',color:'#a5b4fc'}},'🔗 공유'),
                mode==='customer'?h('button',{className:'undo-btn-hdr',onClick:undo,disabled:histLen===0},'↩ 되돌리기 ('+(histLen)+')'):'',
                modeBtns
            )
        ),
        prodBar,
        h('div',{className:'main'},renderCanvas(),renderPanel()),
        modal
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
})();
</script>
</body>
</html>
